<!DOCTYPE html>
<html>
  <head>
    <title>
      insta follow button
    </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <style>
      p{
        margin-top: 0;
        margin-bottom: 0;
        font-family: roboto;
      }
      .profile-picture{
        display: inline-block;
        vertical-align: middle;
      }
      .info{
        display: inline-block;
        vertical-align: middle;
        position: relative; /* NEW */
        padding-right: 200px; /* NEW */
        
      }
      .picture{
        margin-top: 15px;
        border-radius: 100px;
        width: 75px;
        height: 75px;
        object-fit: contain;
        
      }
      .name{
        font-weight: bold;
        font-size: 20px;
        vertical-align: top;
        margin-bottom: 5px;
        margin-left: 8px;
        margin-top: 18px;
      }
      .second-name,.type{
        margin-bottom: 5px;
        margin-left: 8px;
        font-size: 18px;
        color: rgb(132, 120, 120);
      }

      .follow-button{
        position: absolute; /* NEW */
        right: 0; /* NEW */
        background-color: rgb(30, 132, 235);
        border: none;
        color: white;
        width: 80px;
        height: 35px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 3px;
        object-fit: contain;
        top: 50%; /* Centers vertically */
  transform: translateY(-50%); /* Fine-tunes vertical centering */
      }


    </style>

  </head>

  <body>
    <div>
      <div class="profile-picture">
        <img class="picture" src="profile-pictures/Screenshot 2025-06-14 at 8.40.21 PM.png">
        
      </div>
      <div class="info">
        <div>
          
        </div>
        <p class="name">
          oliver
        </p>
        <p class="second-name">the cat</p>
        <p class="type">
          Popular
        </p>
        <button class="follow-button">
          Follow
        </button>
      </div>
    </div>

    <div>
      <div class="profile-picture">
        <img class="picture" src="profile-pictures/Screenshot 2025-06-14 at 9.47.55 PM.png">
        
      </div>
      <div class="info">
        <div>
          
        </div>
        <p class="name">
          Mimi
        </p>
        <p class="second-name">sleepy cat</p>
        <p class="type">
          Popular
        </p>
        <button class="follow-button">
          Follow
        </button>
      </div>
    </div>
    <div>
      <div class="profile-picture">
        <img class="picture" src="profile-pictures/Screenshot 2025-06-14 at 8.40.21 PM.png">
        
      </div>
      <div class="info">
        <div>
          
        </div>
        <p class="name">
          Nitika
        </p>
        <p class="second-name">the cat</p>
        <p class="type">
          Popular
        </p>
        <button class="follow-button">
          Follow
        </button>
      </div>
    </div>

    
    
    
  </body>
</html>
